<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin | SoBella Jewelry</title>
    <link rel="stylesheet" href="../public/styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="admin.html">Admin</a>
      <a href="orders.html">Orders</a>
    </nav>

    <main class="page-shell">
      <h1>Admin inventory</h1>
      <section class="admin-section" aria-labelledby="adminLoginHeading">
        <h2 id="adminLoginHeading">Backoffice login</h2>
        <form id="loginForm" class="checkout-form">
          <input type="text" id="adminUsername" placeholder="Username" autocomplete="username" required />
          <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password" required />
          <button type="submit">Sign in</button>
          <button type="button" id="logoutButton" class="inventory-btn secondary">Sign out</button>
        </form>
        <p id="loginStatus" class="char-count" role="status" aria-live="polite"></p>
      </section>
      <section class="admin-section">
        <h2>Business bio</h2>
        <form id="bioForm" class="checkout-form">
          <textarea id="bioText" maxlength="500" rows="6" placeholder="Write a short bio or description for the business..."></textarea>
          <div class="char-count" id="bioCount">0 / 500</div>
          <button type="submit">Save bio</button>
        </form>
      </section>
      <section class="admin-section">
        <h2>Bank details</h2>
        <form id="bankForm" class="checkout-form">
          <input type="text" id="accountHolder" placeholder="Account holder" />
          <input type="text" id="bankName" placeholder="Bank name" />
          <input type="text" id="accountNumber" placeholder="Account number" />
          <input type="text" id="routingNumber" placeholder="Routing number" />
          <button type="submit">Save bank info</button>
        </form>
      </section>
      <form id="productForm" class="checkout-form">
        <input type="text" id="sku" placeholder="SKU" required />
        <input type="text" id="name" placeholder="Product name" required />
        <input type="text" id="category" placeholder="Category" required />
        <input type="text" id="description" placeholder="Description" />
        <input type="number" id="price" placeholder="Price" min="0" step="0.01" required />
        <input type="number" id="stock" placeholder="Stock" min="0" required />
        <input type="file" id="imageUpload" accept="image/*" />
        <button type="submit">Create product</button>
      </form>
      <div id="adminProducts" class="product-table"></div>
    </main>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
